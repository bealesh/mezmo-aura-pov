name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Stack Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq curl

      - name: Bootstrap
        run: make bootstrap

      - name: Configure API key
        run: |
          # Use a placeholder key — smoke test only checks HTTP endpoints,
          # not LLM inference (which would require a real key and cost money)
          echo "OPENAI_API_KEY=sk-smoke-test-placeholder" >> .env
          echo "LLM_PROVIDER=openai" >> .env

      - name: Start OTel Demo (subset)
        # Start only the observability tier for a faster CI smoke test.
        # Full 19-service demo is validated manually before demo day.
        run: |
          cd otel-demo
          docker compose up -d prometheus grafana otel-collector opensearch
          docker compose ps

      - name: Start Aura + MCP services
        run: docker compose up -d --build mcp-prometheus
        # Note: Aura itself requires a valid LLM API key to start fully.
        # CI validates infrastructure (MCP, network) without burning API credits.

      - name: Wait for Prometheus
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:9090/-/ready; do sleep 5; done'
          echo "Prometheus ready"

      - name: Wait for MCP-Prometheus
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8082/health | grep -q status; do sleep 5; done'
          echo "MCP-Prometheus ready"

      - name: Run Prometheus tests
        run: ./tests/test-prometheus.sh

      - name: Verify MCP health endpoint
        run: |
          health=$(curl -sf http://localhost:8082/health)
          echo "$health"
          echo "$health" | jq -e '.status' > /dev/null

      - name: Verify flagd JSON is valid
        run: |
          jq . otel-demo/src/flagd/demo.flagd.json > /dev/null
          echo "flagd JSON valid"

      - name: Verify fault injection scripts are executable
        run: |
          for f in scripts/*.sh tests/*.sh; do
            [ -x "$f" ] && echo "  ✓ $f" || { echo "  ✗ $f not executable"; exit 1; }
          done

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --tail=50 || true
          cd otel-demo && docker compose logs prometheus --tail=50 || true
